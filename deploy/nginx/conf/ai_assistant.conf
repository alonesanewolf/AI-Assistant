# ============================================
# AI_Assistant 统一平台 Nginx 配置
# 适用于 CentOS 7.6+ 云服务器
# 文件位置: /etc/nginx/conf.d/ai_assistant.conf
# ============================================
#
# 架构说明:
#   Nginx :80  → 统一入口，反向代理到各服务
#     ├── /             → 统一门户首页（静态 HTML）
#     ├── /ai/          → AI 智能助手 Web UI (8080)
#     ├── /netsec/      → 网络安全助手平台 (5100)
#     ├── /brain/       → 云端大脑 API (5000)
#     ├── /api/         → API 端点 (8080)
#     └── /health       → 健康检查
#
# 可选:
#   Nginx :8089  → Apache Tomcat (8089)
# ============================================

# ============================================
# AI_Assistant 后端服务器组
# ============================================
upstream ai_web {
    # Web UI 服务 (local_assistant.py)
    server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
    
    # 开启 Keep-Alive 连接池
    keepalive 32;
    keepalive_timeout 60s;
}

upstream ai_brain {
    # 云端大脑 API (brain.py)
    server 127.0.0.1:5000 weight=1 max_fails=3 fail_timeout=30s;
    
    keepalive 16;
    keepalive_timeout 60s;
}

upstream netsec_platform {
    # 网络安全助手 (try-three run.py)
    server 127.0.0.1:5100 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 16;
    keepalive_timeout 60s;
}

# ============================================
# Tomcat 后端（可选，如需 Java 服务）
# ============================================
upstream tomcat_backend {
    server 127.0.0.1:8089 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================
# 主站点: AI_Assistant
# ============================================
server {
    listen 80;
    server_name _;
    charset utf-8;

    # 客户端请求体大小限制
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # 访问日志
    access_log /var/log/nginx/ai_assistant_access.log;
    error_log  /var/log/nginx/ai_assistant_error.log  warn;

    # ========================================
    # 统一门户首页（静态 HTML）
    # ========================================
    location = / {
        root /opt/AI_Assistant/deploy/nginx/html;
        try_files /index.html =404;
    }

    # ========================================
    # AI 智能助手 (代理到 8080)
    # ========================================
    location /ai/ {
        rewrite ^/ai/(.*) /$1 break;
        proxy_pass http://ai_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ========================================
    # AI 助手 WebSocket (Socket.IO)
    # ========================================
    location /ai/socket.io/ {
        rewrite ^/ai/(.*) /$1 break;
        proxy_pass http://ai_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ========================================
    # 云端 Brain API 代理
    # ========================================
    location /brain/ {
        proxy_pass http://ai_brain/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 32k;
    }

    # ========================================
    # API 端点（兼容旧路径，指向 AI 助手）
    # ========================================
    location /api/ {
        proxy_pass http://ai_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ========================================
    # 网络安全助手平台 (NetSec) 端口 5100
    # ========================================
    location /netsec/ {
        proxy_pass http://netsec_platform/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name     /netsec;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_redirect http://127.0.0.1:5100/ /netsec/;
        proxy_redirect / /netsec/;
    }

    # NetSec 静态资源
    location /netsec/static/ {
        proxy_pass http://netsec_platform/static/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========================================
    # 静态资源缓存优化（AI 助手用）
    # ========================================
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://ai_web;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ========================================
    # 兜底：代理到 AI_Assistant Web UI
    # ========================================
    location / {
        proxy_pass http://ai_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ========================================
    # 健康检查端点
    # ========================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"ai_assistant","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # ========================================
    # 禁止访问隐藏文件
    # ========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================
    # 自定义错误页面
    # ========================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}


# ============================================
# Nginx 状态监控（仅本地访问）
# ============================================
server {
    listen 8088;
    server_name _;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 200 "AI_Assistant 统一平台状态\n\nEndpoints:\n  /nginx_status   - Nginx 状态统计\n  :80             - AI 智能助手\n  :80/netsec/     - 网络安全助手\n  :80/brain/      - 云端大脑 API\n  :80/health      - 健康检查\n  :8089           - Apache Tomcat (可选)\n";
        add_header Content-Type text/plain;
    }
}

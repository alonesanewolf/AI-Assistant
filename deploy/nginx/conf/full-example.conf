# ============================================
# Nginx 综合案例：反向代理 + 负载均衡
# 文件位置: /etc/nginx/conf.d/full-example.conf
#
# 应用场景：
#   - 前端应用 (React/Vue) → 端口 80
#   - API 服务    → 端口 8081/8082/8083 (负载均衡)
#   - 静态资源    → 单独处理 + 缓存
#   - WebSocket  → 支持长连接
#   - 健康检查    → 自动熔断
# ============================================

# ============================================
# 全局速率限制区域定义
# 在 nginx.conf 的 http 块中添加：
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
#   limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
# ============================================


# ============================================
# API 后端服务器组（负载均衡）
# ============================================
upstream api_servers {
    # 加权轮询：8011 性能最强
    server 127.0.0.1:8081 weight=5 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8082 weight=3 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8083 weight=2 max_fails=3 fail_timeout=30s;
    
    # 开启 Keep-Alive 连接池（减少连接开销）
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# ============================================
# WebSocket 后端服务器组
# ============================================
upstream ws_servers {
    # IP Hash 保证同一客户端的 WebSocket 始终连接同一后端
    ip_hash;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}


# ============================================
# 主站点配置
# ============================================
server {
    listen 80;
    server_name _;
    charset utf-8;

    # 客户端请求体大小限制（文件上传）
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # 访问日志
    access_log /var/log/nginx/main_access.log main;
    error_log  /var/log/nginx/main_error.log  warn;

    # ========================================
    # 前端静态页面（假设部署在 /opt/web/dist）
    # ========================================
    root /opt/web/dist;
    index index.html index.htm;

    # ========================================
    # API 反向代理（带负载均衡）
    # ========================================
    location /api/ {
        # 去掉 /api 前缀再转发给后端
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://api_servers;

        # 请求头透传
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-Alive 配置
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 缓冲配置
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 32k;

        # 错误处理
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # 速率限制（需要先在 http 块定义 limit_req_zone）
        # limit_req zone=api_limit burst=20 nodelay;
    }

    # ========================================
    # WebSocket 代理
    # ========================================
    location /ws/ {
        proxy_pass http://ws_servers;

        # WebSocket 必须配置
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # WebSocket 超时（建议较长）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ========================================
    # 静态资源（带缓存优化）
    # ========================================
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot|otf|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        add_header Vary "Accept-Encoding";
        access_log off;

        # Gzip 压缩（需要在 nginx.conf http 块开启）
        # gzip on;
        # gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
        # gzip_min_length 1k;
        # gzip_comp_level 6;
    }

    # ========================================
    # 前端路由 History 模式支持 (SPA)
    # ========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================
    # 健康检查端点
    # ========================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # ========================================
    # 自定义错误页面
    # ========================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ========================================
    # 禁止访问隐藏文件
    # ========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}



# ============================================
# Nginx 反向代理配置
# 文件位置: /etc/nginx/conf.d/proxy.conf
# ============================================

# 上游后端服务器定义
upstream backend_app {
    # 后端服务器列表（默认轮询）
    server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;

    # 参数说明:
    #   weight=N         权重，默认1
    #   max_fails=N      最大失败次数，超过后标记为不可用
    #   fail_timeout=Ns  失败超时，超过此时间后重新尝试
    #   backup           标记为备用服务器
    #   down             标记为永久不可用
}

server {
    listen 80;
    # server_name 替换为你的域名或 IP
    server_name _;

    charset utf-8;

    # 日志
    access_log /var/log/nginx/proxy_access.log main;
    error_log  /var/log/nginx/proxy_error.log  warn;

    # ========== 反向代理核心配置 ==========
    location / {
        # 代理到上游服务器组
        proxy_pass http://backend_app;

        # 传递客户端真实信息（关键！）
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # 代理缓冲区设置（优化大响应传输）
        proxy_buffering            on;
        proxy_buffer_size          4k;
        proxy_buffers              8 32k;
        proxy_busy_buffers_size    64k;
        proxy_temp_file_write_size 64k;

        # 超时设置
        proxy_connect_timeout      30s;
        proxy_send_timeout         60s;
        proxy_read_timeout         60s;

        # WebSocket 支持（可选）
        proxy_http_version         1.1;
        proxy_set_header           Upgrade    $http_upgrade;
        proxy_set_header           Connection "upgrade";

        # 禁止代理缓存（动态应用推荐）
        # proxy_no_cache 1;
        # proxy_cache_bypass 1;

        # 错误处理：后端不可用时显示自定义页面
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # ========== 静态资源优化 ==========
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 静态资源缓存 7 天
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # ========== 自定义 50x 错误页面 ==========
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ========== 健康检查端点 ==========
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ========== 限制请求速率（防 CC 攻击） ==========
    # limit_req_zone $binary_remote_addr zone=req_limit:10m rate=30r/s;
    # location / {
    #     limit_req zone=req_limit burst=10 nodelay;
    #     ...
    # }
}

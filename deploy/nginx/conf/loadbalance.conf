# ============================================
# Nginx 负载均衡配置 - 五种策略对比
# 文件位置: /etc/nginx/conf.d/loadbalance.conf
# ============================================

# ┌─────────────────────────────────────────────────────────────┐
# │                      负载均衡策略说明                          │
# ├───────────────┬─────────────────────────────────────────────┤
# │ 策略           │ 适用场景                                    │
# ├───────────────┼─────────────────────────────────────────────┤
# │ 轮询（默认）    │ 后端服务器性能均等                            │
# │ 加权轮询       │ 后端服务器性能不均，按能力分配                  │
# │ IP Hash       │ 需要会话保持（Session sticky）               │
# │ 最少连接数     │ 请求处理时间差异大，如长短连接混合               │
# │ URL Hash      │ 配合缓存使用，相同URL走相同后端                 │
# └───────────────┴─────────────────────────────────────────────┘


# ============================================
# 策略1：默认轮询（Round Robin）
# 请求按顺序逐一分配到每个后端服务器
# ============================================
upstream lb_round_robin {
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}


# ============================================
# 策略2：加权轮询（Weighted Round Robin）
# weight 值越大，分配的请求越多
# 示例比例 5:3:1，9个请求中 8081 处理5个
# ============================================
upstream lb_weighted {
    server 127.0.0.1:8081 weight=5;
    server 127.0.0.1:8082 weight=3;
    server 127.0.0.1:8083 weight=1;
}


# ============================================
# 策略3：IP Hash
# 根据客户端 IP 的哈希值分配，同一IP始终访问同一后端
# 注意：Nginx 变更时可能导致分配变化
# ============================================
upstream lb_ip_hash {
    ip_hash;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}


# ============================================
# 策略4：最少连接数（Least Connections）
# 请求分配给当前活跃连接数最少的后端
# 适合长连接或处理时间差异大的场景
# ============================================
upstream lb_least_conn {
    least_conn;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}


# ============================================
# 策略5：URL Hash（一致性哈希）
# 相同 URL 始终路由到同一后端，配合缓存使用
# ============================================
upstream lb_url_hash {
    hash $request_uri consistent;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}


# ============================================
# 策略6：高可用配置（带故障转移）
# max_fails + fail_timeout 实现健康检查
# backup 服务器作为冷备
# ============================================
upstream lb_ha {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8083 max_fails=3 fail_timeout=30s;
    # 备用服务器：仅当所有主服务器都不可用时启用
    server 127.0.0.1:8080 backup;
}


# ============================================
# 通用代理设置（减少重复代码）
# ============================================

# 使用 include 或变量方式，这里为每个 server 分别配置


# ================================================================
# 虚拟主机 1：默认轮询 → 端口 80
# ================================================================
server {
    listen 80;
    server_name _;

    charset utf-8;
    access_log /var/log/nginx/lb_round_robin_access.log main;
    error_log  /var/log/nginx/lb_round_robin_error.log  warn;

    location / {
        proxy_pass http://lb_round_robin;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-LB-Strategy     "round_robin";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}


# ================================================================
# 虚拟主机 2：加权轮询 → 端口 8090（权重 5:3:1）
# ================================================================
server {
    listen 8090;
    server_name _;

    charset utf-8;
    access_log /var/log/nginx/lb_weighted_access.log main;

    location / {
        proxy_pass http://lb_weighted;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-LB-Strategy     "weighted(5:3:1)";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}


# ================================================================
# 虚拟主机 3：IP Hash → 端口 8091
# ================================================================
server {
    listen 8091;
    server_name _;

    charset utf-8;
    access_log /var/log/nginx/lb_iphash_access.log main;

    location / {
        proxy_pass http://lb_ip_hash;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-LB-Strategy     "ip_hash";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}


# ================================================================
# 虚拟主机 4：最少连接 → 端口 8092
# ================================================================
server {
    listen 8092;
    server_name _;

    charset utf-8;
    access_log /var/log/nginx/lb_leastconn_access.log main;

    location / {
        proxy_pass http://lb_least_conn;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-LB-Strategy     "least_conn";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}


# ================================================================
# 虚拟主机 5：URL Hash → 端口 8093
# ================================================================
server {
    listen 8093;
    server_name _;

    charset utf-8;
    access_log /var/log/nginx/lb_urlhash_access.log main;

    location / {
        proxy_pass http://lb_url_hash;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-LB-Strategy     "url_hash";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}


# ================================================================
# 虚拟主机 6：高可用配置 → 端口 8094
# ================================================================
server {
    listen 8094;
    server_name _;

    charset utf-8;
    access_log /var/log/nginx/lb_ha_access.log main;
    error_log  /var/log/nginx/lb_ha_error.log  warn;

    location / {
        proxy_pass http://lb_ha;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-LB-Strategy     "ha";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # 后端不可用时的错误页面
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
}


# ================================================================
# Nginx 状态监控 → 端口 8088（仅本机访问）
# ================================================================
server {
    listen 8088;
    server_name _;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 200 "Nginx LB Dashboard\n\n端点:\n /nginx_status  - 状态统计\n 端口 80 - 默认轮询\n 端口 8090 - 加权轮询 (5:3:1)\n 端口 8091 - IP Hash\n 端口 8092 - 最少连接数\n 端口 8093 - URL Hash\n 端口 8094 - 高可用\n";
        add_header Content-Type text/plain;
    }
}

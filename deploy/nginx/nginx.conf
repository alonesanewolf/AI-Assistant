# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;
	
    upstream backend_app {
    	server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;
    	server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;
    	# 健康检查配置
    	# max_fails: 最大失败次数
    	# fail_timeout: 失败超时后重新尝试的时间
    }	
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;
        root         /usr/share/nginx/html;
	# 字符集
    	charset utf-8;

        # 访问日志（使用自定义格式记录代理信息）
        access_log /var/log/nginx/proxy_access.log main;
		error_log  /var/log/nginx/proxy_error.log  warn;
        # Load configuration files for the default server block.
        include /etc/nginx/default.d/*.conf;
		
		 # ========== 反向代理核心配置 ==========
		location / {
			# 代理到上游服务器
			proxy_pass http://backend_app;

			# 传递真实客户端 IP
			proxy_set_header   Host              $host;
			proxy_set_header   X-Real-IP         $remote_addr;
			proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Proto  $scheme;

			# 代理缓冲区设置
			proxy_buffering            on;
			proxy_buffer_size          4k;
			proxy_buffers              8 32k;
			proxy_busy_buffers_size    64k;

			# 超时设置
			proxy_connect_timeout      30s;   # 连接后端超时
			proxy_send_timeout         60s;   # 发送请求到后端超时
			proxy_read_timeout         60s;   # 读取后端响应超时

			# 开启 WebSocket 支持（如需要）
			proxy_http_version         1.1;
			proxy_set_header           Upgrade    $http_upgrade;
			proxy_set_header           Connection "upgrade";
		}
		
		# ========== 静态资源单独处理（性能优化） ==========
		location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
			proxy_pass http://backend_app;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

			# 静态资源缓存
			expires 7d;
			add_header Cache-Control "public, immutable";
		}

		# ========== 健康检查端点 ==========
		location /health {
			access_log off;
			return 200 "OK\n";
			add_header Content-Type text/plain;
		}
		
        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

